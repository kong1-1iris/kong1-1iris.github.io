function catmullRom(pts,n_interp){
 let smooth=[];
 for(let i=0;i<pts.length-1;i++){
  let p0=i==0?pts[i]:pts[i-1];
  let p1=pts[i];
  let p2=pts[i+1];
  let p3=i+2<pts.length?pts[i+2]:pts[i+1];
  for(let t=0;t<1;t+=1/n_interp){
   let t2=t*t,t3=t2*t;
   let x=0.5*((2*p1[0])+(-p0[0]+p2[0])*t+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3);
   let y=0.5*((2*p1[1])+(-p0[1]+p2[1])*t+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3);
   let z=0.5*((2*p1[2])+(-p0[2]+p2[2])*t+(2*p0[2]-5*p1[2]+4*p2[2]-p3[2])*t2+(-p0[2]+3*p1[2]-3*p2[2]+p3[2])*t3);
   smooth.push([x,y,z]);
  }
 }
 return smooth;
}

let updateTimer=null;
function throttleUpdate(){
 if(updateTimer) return;

  updateTimer=null;

function u(){
 let ratio=document.getElementById("r").value/100;
 document.getElementById("rvG").innerText=(ratio*100).toFixed(0)+"%";
 document.getElementById("rvC").innerText=((1-ratio)*100).toFixed(0)+"%";
 let thk=document.getElementById("t").value/1000;
 document.getElementById("tv").innerText=thk.toFixed(3);
 for(let i=1;i<=5;i++){
  let pts=smoothData[i-1];
  let x=[],y=[],z=[];
  let iG=[],jG=[],kG=[];
  let iC=[],jC=[],kC=[];
  let n=32;
  let rout=0.08;
  let rin=rout-thk;
  let localX=[];
  for(let j=0;j<pts.length;j++){
   let t=(j<pts.length-1)?[pts[j+1][0]-pts[j][0],pts[j+1][1]-pts[j][1],pts[j+1][2]-pts[j][2]]:[pts[j][0]-pts[j-1][0],pts[j][1]-pts[j-1][1],pts[j][2]-pts[j-1][2]];
   let m=Math.sqrt(t[0]**2+t[1]**2+t[2]**2);
   t=[t[0]/m,t[1]/m,t[2]/m];
   let n1=[t[1],-t[0],0];
   let n1m=Math.sqrt(n1[0]**2+n1[1]**2);
   if(n1m<0.1) n1=[0,t[2],-t[1]];
   n1m=Math.sqrt(n1[0]**2+n1[1]**2+n1[2]**2);
   n1=[n1[0]/n1m,n1[1]/n1m,n1[2]/n1m];
   let n2=[t[1]*n1[2]-t[2]*n1[1],t[2]*n1[0]-t[0]*n1[2],t[0]*n1[1]-t[1]*n1[0]];
   for(let s=0;s<n;s++){
    let a=2*Math.PI*s/n;
    let cosA=Math.cos(a);
    let sinA=Math.sin(a);
    x.push(pts[j][0]+rout*(cosA*n1[0]+sinA*n2[0]),pts[j][0]+rin*(cosA*n1[0]+sinA*n2[0]));
    y.push(pts[j][1]+rout*(cosA*n1[1]+sinA*n2[1]),pts[j][1]+rin*(cosA*n1[1]+sinA*n2[1]));
    z.push(pts[j][2]+rout*(cosA*n1[2]+sinA*n2[2]),pts[j][2]+rin*(cosA*n1[2]+sinA*n2[2]));
    localX.push(cosA,cosA);
   }
  }
  for(let j=0;j<pts.length-1;j++){
   for(let s=0;s<n;s++){
    let p1=(j*n+s)*2;
    let p2=(j*n+(s+1)%n)*2;
    let p3=((j+1)*n+s)*2;
    let p4=((j+1)*n+(s+1)%n)*2;
    let avgX=(localX[p1]+localX[p2])/2;
    let f=(avgX<(ratio*2-1))?{i:iG,j:jG,k:kG}:{i:iC,j:jC,k:kC};
    f.i.push(p1,p2,p3,p2,p4,p3);
    f.j.push(p2,p4,p4,p4,p3,p1);
    f.k.push(p3,p3,p1,p3,p1,p2);
   }
  }
  let traces=[];
  if(iC.length>0)
  traces.push({type:"mesh3d",x:x,y:y,z:z,i:iC,j:jC,k:kC,color:"#b0b0b0"});
  if(iG.length>0)
  traces.push({type:"mesh3d",x:x,y:y,z:z,i:iG,j:jG,k:kG,color:"#2eb8b8"});
  Plotly.react("p"+i,traces,{uirevision:"true",margin:{l:0,r:0,b:0,t:0},scene:{aspectmode:"data",xaxis:{visible:false},yaxis:{visible:false},zaxis:{visible:false}}},{displayModeBar:false});
 }
}
u();
// 初始化相机位置阵列和鼠标悬停状态
let cams = [];
let isHovered = [];
for(let i=1; i<=5; i++){
  cams.push({x: 1.5, y: 1.5, z: 1.2}); // 默认初始视角
  isHovered.push(false);
  let div = document.getElementById("p"+i);
  let card = div.parentElement;
  
  // 鼠标移入：暂停旋转
  card.addEventListener("mouseenter", function() {
      isHovered[i-1] = true;
  });
  
  // 鼠标移出：恢复旋转，并同步用户交互后的新视角
  card.addEventListener("mouseleave", function() {
      isHovered[i-1] = false;
      if(div.layout && div.layout.scene && div.layout.scene.camera && div.layout.scene.camera.eye) {
          cams[i-1] = {
              x: div.layout.scene.camera.eye.x,
              y: div.layout.scene.camera.eye.y,
              z: div.layout.scene.camera.eye.z
          };
      }
  });
}

// 全局动画循环
function rotateAll() {
  for(let i=1; i<=5; i++){
    if(!isHovered[i-1]) { // 仅当鼠标未悬停时才自动旋转
      let cx = cams[i-1].x;
      let cy = cams[i-1].y;
      let r = Math.sqrt(cx*cx + cy*cy);
      let theta = Math.atan2(cy, cx) + 0.005; // 旋转速度 (数值越大转越快)
      cams[i-1].x = r * Math.cos(theta);
      cams[i-1].y = r * Math.sin(theta);
      try {
          Plotly.relayout("p"+i, {"scene.camera.eye": cams[i-1]});
      } catch(e) {}
    }
  }
  requestAnimationFrame(rotateAll);
}
rotateAll();
